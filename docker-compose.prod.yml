services:
  cloud-server:
    build:
      context: .
      dockerfile: apps/cloud-server/Dockerfile
    image: codex-remote/cloud-server:prod
    restart: unless-stopped
    environment:
      CLOUD_CODEX_HOST: 0.0.0.0
      CLOUD_CODEX_PORT: 8787
      CLOUD_CODEX_DB_PATH: /data/cloudcodex.sqlite
      CLOUD_CODEX_UPLOAD_DIR: /data/uploads
      CLOUD_CODEX_TOKEN_HASH_SECRET: ${CLOUD_CODEX_TOKEN_HASH_SECRET:?set CLOUD_CODEX_TOKEN_HASH_SECRET}
      CLOUD_CODEX_BOOTSTRAP_TOKEN: ${CLOUD_CODEX_BOOTSTRAP_TOKEN:?set CLOUD_CODEX_BOOTSTRAP_TOKEN}
      CLOUD_CODEX_ALLOWED_ORIGINS: ${CLOUD_CODEX_ALLOWED_ORIGINS:-https://codex.anishalle.com}
      CLOUD_CODEX_SECURE_COOKIES: "1"
      CLOUD_CODEX_WS_MAX_PAYLOAD_BYTES: ${CLOUD_CODEX_WS_MAX_PAYLOAD_BYTES:-65536}
    ports:
      - "127.0.0.1:${CLOUD_CODEX_HOST_PORT:-8787}:8787"
    volumes:
      - cloudcodex-server-data:/data
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=128m
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 1g
    cpus: 1
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - cloudcodex-control

  cloud-runner:
    build:
      context: .
      dockerfile: apps/cloud-runner/Dockerfile
    image: codex-remote/cloud-runner:prod
    restart: unless-stopped
    profiles:
      - runner
    environment:
      CLOUD_CODEX_SERVER_URL: ${CLOUD_CODEX_INTERNAL_SERVER_URL:-http://cloud-server:8787}
      CLOUD_CODEX_ALLOW_INSECURE_HTTP: "1"
      CLOUD_CODEX_RUNNER_ID: ${CLOUD_CODEX_RUNNER_ID:-cloud-runner-vps}
      CLOUD_CODEX_RUNNER_NAME: ${CLOUD_CODEX_RUNNER_NAME:-VPS cloud runner}
      CLOUD_CODEX_WS_ORIGIN: ${CLOUD_CODEX_PUBLIC_ORIGIN:-https://codex.anishalle.com}
      CLOUD_CODEX_WORKSPACES_ROOT: /workspaces
      CLOUD_CODEX_RUNNER_HOME: /cloudcodex
      CLOUD_CODEX_SESSION_TOKEN_FILE: /cloudcodex/session.token
      CODEX_HOME: /codex-home
      HOME: /codex-home
    volumes:
      - cloudcodex-workspaces:/workspaces
      - cloudcodex-codex-home:/codex-home
      - cloudcodex-runner-state:/cloudcodex
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
    user: "10001:10001"
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 512
    mem_limit: 4g
    cpus: 2
    depends_on:
      cloud-server:
        condition: service_healthy
    networks:
      - cloudcodex-control
    # Deliberately no "ports:" block and no Docker socket mount.

volumes:
  cloudcodex-server-data:
  cloudcodex-workspaces:
  cloudcodex-codex-home:
  cloudcodex-runner-state:

networks:
  cloudcodex-control:
    name: cloudcodex-control
