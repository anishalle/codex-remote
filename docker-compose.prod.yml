services:
  t3:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
      args:
        CODEX_NPM_PACKAGE: ${CODEX_NPM_PACKAGE:-@openai/codex}
    image: codex-remote/t3:prod
    restart: unless-stopped
    user: "${T3_UID:-1000}:${T3_GID:-1000}"
    environment:
      T3CODE_HOME: /data/t3
      T3_WORKSPACE_CWD: /workspace/codex-remote
      T3CODE_PORT: 8787
      HOME: /codex-home
      CODEX_HOME: /codex-home
    ports:
      - "127.0.0.1:${T3_HOST_PORT:-8787}:8787"
    volumes:
      - ${T3_SERVER_DATA_DIR:-/home/opc/.t3-server-data}:/data
      - ${T3_CODEX_HOME_DIR:-/home/opc/.t3-codex-home}:/codex-home
      - .:/workspace/codex-remote
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
      - seccomp=unconfined
    pids_limit: 512
    mem_limit: 4g
    cpus: 2
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:8787/.well-known/t3/environment').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
